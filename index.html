<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>节奏榜编辑器</title>
<script src="ass-images.js"></script>
<style>
:root {
  --bg: #0d0a07;
  --surface: #1a1410;
  --surface2: #241b14;
  --border: #3a2e22;
  --text: #f0e8d8;
  --text2: #a89880;
  --accent: #d4a84a;
  --danger: #c8392f;
  font-family: "Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  font-size: 13px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background:
    radial-gradient(ellipse at 18% 8%, rgba(212,168,74,0.10), transparent 55%),
    radial-gradient(ellipse at 85% 18%, rgba(200,57,47,0.06), transparent 55%),
    radial-gradient(ellipse at 50% 96%, rgba(212,168,74,0.07), transparent 60%),
    radial-gradient(ellipse at 8% 78%, rgba(120,80,40,0.05), transparent 55%),
    var(--bg);
  color: var(--text); height: 100vh; overflow: hidden;
}
button { font: inherit; border: 0; cursor: pointer; background: none; color: inherit; }
input { font: inherit; outline: none; }

.app { display: flex; height: 100vh; }

/* ========== Top Bar ========== */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.topbar h1 { font-size: 16px; font-weight: 800; margin-right: auto; letter-spacing: 2px; }
.topbar .sub { font-size: 11px; color: var(--text2); }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 30px; padding: 0 14px; border-radius: 6px;
  font-size: 12px; font-weight: 700; gap: 4px;
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); transition: all 0.15s;
}
.btn:hover { background: #2a1f17; border-color: #5a4a32; }
.btn.primary {
  background: linear-gradient(180deg, #e8be60 0%, #d4a84a 50%, #b8902e 100%);
  border-color: #d4a84a; color: #1a1410;
  box-shadow: inset 0 1px 0 rgba(255,235,170,0.6), inset 0 -1px 0 rgba(80,50,10,0.35), 0 1px 3px rgba(0,0,0,0.35);
  text-shadow: 0 1px 0 rgba(255,235,170,0.3);
}
.btn.primary:hover { filter: brightness(1.08); }
.btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; filter: grayscale(0.5); }
.btn-sm { height: 24px; padding: 0 8px; font-size: 11px; }

/* ========== Left Side ========== */
.left-panel {
  flex: 0 0 75%; display: flex; flex-direction: column; min-width: 0;
}
.tier-scroll {
  flex: 1; overflow-y: auto; padding: 12px 16px 16px;
}
.tier-scroll::-webkit-scrollbar { width: 6px; }
.tier-scroll::-webkit-scrollbar-track { background: transparent; }
.tier-scroll::-webkit-scrollbar-thumb { background: #3a2e22; border-radius: 3px; }

.tier-row {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 10px; padding: 10px 14px;
  border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.15);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.tier-row:hover {
  border-color: rgba(212,168,74,0.45);
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.50);
}
.tier-row.drag-over {
  border-color: var(--accent);
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.6), 0 0 0 2px rgba(212,168,74,0.3);
}

.tier-label-area {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; min-width: 90px; padding-top: 4px;
}
.tier-color-bar {
  width: 8px; height: 60px; border-radius: 4px; flex-shrink: 0; cursor: pointer;
}
.tier-name {
  font-weight: 800; font-size: 36px; cursor: pointer; white-space: nowrap;
  line-height: 1; transition: color 0.15s; letter-spacing: 2px;
}
.tier-name:hover { color: #f0e8d8; }
.tier-count {
  font-size: 11px; color: var(--text2); white-space: nowrap; align-self: flex-end;
  margin-bottom: 4px;
}

.tier-body {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start;
  flex: 1; padding: 2px 0; min-height: 60px;
}
.tier-body.drag-over { background: rgba(212,168,74,0.06); border-radius: 6px; }
.tier-body.empty::after {
  content: "拖入角色到此处"; display: block;
  font-size: 12px; color: var(--text2); padding: 20px 0 0 0;
  pointer-events: none;
}

.tier-actions {
  display: flex; flex-direction: column; gap: 4px;
  flex-shrink: 0; padding-top: 4px;
}
.tier-action-btn {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 5px; font-size: 14px; color: var(--text2); opacity: 0.4;
  transition: all 0.15s; cursor: pointer;
}
.tier-action-btn:hover { opacity: 1; background: rgba(240,232,216,0.08); color: #f0e8d8; }
.tier-action-btn.del:hover { color: var(--danger); }

/* ========== Right Side ========== */
.right-panel {
  flex: 0 0 25%; display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: var(--surface); min-width: 0;
}
.pool-scroll {
  flex: 1; overflow-y: auto; padding: 12px 16px 16px;
}
.pool-scroll::-webkit-scrollbar { width: 6px; }
.pool-scroll::-webkit-scrollbar-track { background: transparent; }
.pool-scroll::-webkit-scrollbar-thumb { background: #3a2e22; border-radius: 3px; }

.pool-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; letter-spacing: 2px; }

.faction-filters {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.faction-btn {
  flex: 1; padding: 5px 4px; border-radius: 14px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; white-space: nowrap; text-align: center;
}
.faction-btn:hover { background: #2a1f17; color: #f0e8d8; }
.faction-btn.active { background: rgba(212,168,74,0.2); color: #f0e8d8; border-color: var(--accent); }

.pool-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  align-content: flex-start; min-height: 60px;
}

.upload-zone {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 14px; text-align: center; margin-bottom: 12px;
  cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent); background: rgba(212,168,74,0.06);
}
.upload-icon {
  font-size: 24px; color: var(--text2); line-height: 1; margin-bottom: 4px;
}
.upload-hint {
  font-size: 12px; color: var(--text2); line-height: 1.5;
}



/* ========== Character Images ========== */
.char-img {
  border-radius: 8px; cursor: grab; border: 2px solid transparent;
  transition: transform 0.15s; background: #1a1410; display: block;
  will-change: transform;
}
.char-img:hover { transform: scale(1.06); z-index: 2; }
.char-img:active { cursor: grabbing; }
.char-img.dragging { opacity: 0.3; }
.char-img[data-faction="元素"] { border-color: #FF6B6B; }
.char-img[data-faction="旷野"] { border-color: #69DB7C; }
.char-img[data-faction="奥术"] { border-color: #DA77F2; }
.char-img[data-faction="圣堂"] { border-color: #FFD43B; }
.char-img[data-faction="彼岸"] { border-color: #748FFC; }
.char-img[data-faction="幻境"] { border-color: #F783AC; }
.char-img.in-tier { height: 130px; width: auto; cursor: grab; }
.char-img.in-pool { width: 100%; height: auto; aspect-ratio: 3/4; cursor: pointer; border-radius: 6px; object-fit: cover; }
.char-img.in-pool.hidden { display: none; }
.char-img.in-pool:hover { border-color: var(--accent); }

/* ========== Context Menu ========== */
.ctx-menu {
  position: fixed; z-index: 99999;
  background: #1a1410; border: 1px solid #3a2e22;
  border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  padding: 4px 0; min-width: 120px; display: none;
}
.ctx-menu.show { display: block; }
.ctx-item {
  padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text); letter-spacing: 1px;
}
.ctx-item:hover { background: rgba(212,168,74,0.2); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: rgba(200,57,47,0.15); }
#ctxDelete { display: none; }

/* ========== Status ========== */
.statusbar {
  height: 26px; display: flex; align-items: center;
  padding: 0 14px; font-size: 10px; color: var(--text2);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.statusbar.success { color: #8aa86a; }

/* ========== 词条封面生成模态框 ========== */
.modal-mask {
  position: fixed; inset: 0; z-index: 100000;
  background: rgba(13,10,7,0.78);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
}
.modal-mask.show { display: flex; }
.modal-card {
  background: linear-gradient(180deg, #1a1410 0%, #15100a 100%);
  border: 1px solid #3a2e22;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(212,168,74,0.18);
  border-radius: 14px;
  width: 880px; max-width: 96vw; height: auto;
  display: flex; flex-direction: column;
}
.modal-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 1px solid #3a2e22;
  background: linear-gradient(180deg, rgba(212,168,74,0.06), transparent);
}
.modal-head h2 { font-size: 16px; font-weight: 800; letter-spacing: 3px; color: #f0e8d8; }
.modal-head .sub { font-size: 11px; color: #a89880; margin-right: auto; }
.modal-close {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #a89880; font-size: 18px; cursor: pointer;
  transition: all 0.15s;
}
.modal-close:hover { background: rgba(212,168,74,0.12); color: #f0e8d8; }

.modal-body { display: flex; flex: 1; min-height: 0; overflow-y: auto; }
.modal-left {
  flex: 0 0 380px; padding: 18px 20px;
  overflow-y: auto; border-right: 1px solid #3a2e22;
}
.modal-left::-webkit-scrollbar { width: 6px; }
.modal-left::-webkit-scrollbar-track { background: transparent; }
.modal-left::-webkit-scrollbar-thumb { background: #3a2e22; border-radius: 3px; }
.section-label {
  font-size: 12px; font-weight: 700; color: #d4a84a;
  letter-spacing: 3px; margin: 14px 0 10px;
  padding-bottom: 6px; border-bottom: 1px solid rgba(212,168,74,0.15);
}
.section-label:first-child { margin-top: 0; }
.choice-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.choice-grid.cols-7 { grid-template-columns: repeat(7, 1fr); gap: 6px; }
.choice-btn {
  background: #241b14; border: 1px solid #3a2e22; border-radius: 8px;
  padding: 8px 4px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all 0.15s;
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.08);
}
.choice-btn:hover {
  background: #2a1f17; border-color: rgba(212,168,74,0.5);
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.4);
}
.choice-btn.active {
  background: linear-gradient(180deg, rgba(212,168,74,0.25), rgba(212,168,74,0.10));
  border-color: #d4a84a;
  box-shadow: inset 0 0 0 1px rgba(212,168,74,0.6), 0 0 0 2px rgba(212,168,74,0.15);
}
.choice-btn img { width: 36px; height: 36px; object-fit: contain; }
.choice-btn.faction img { width: 42px; height: 42px; }
.choice-btn .lbl { font-size: 11px; color: #f0e8d8; letter-spacing: 1px; }
.slot-row { display: flex; gap: 8px; margin-top: 6px; }
.slot-card {
  flex: 1; background: #15100a; border: 1px dashed #3a2e22; border-radius: 8px;
  padding: 8px; min-height: 80px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #a89880;
}
.slot-card .sl-label { color: #d4a84a; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; font-size: 10px; }
.slot-card .sl-name { color: #f0e8d8; font-size: 12px; letter-spacing: 1px; }
.slot-card.filled { border-style: solid; border-color: rgba(212,168,74,0.5); background: rgba(212,168,74,0.05); }

.up-zone {
  border: 2px dashed #3a2e22; border-radius: 10px;
  padding: 18px; text-align: center; cursor: pointer;
  transition: all 0.2s; margin-top: 4px;
  background: #15100a;
}
.up-zone:hover, .up-zone.dragover {
  border-color: #d4a84a; background: rgba(212,168,74,0.06);
}
.up-zone .ic { font-size: 28px; color: #a89880; line-height: 1; }
.up-zone .ht { font-size: 12px; color: #a89880; margin-top: 4px; letter-spacing: 1px; }
.up-zone .sm { font-size: 10px; color: #6a5a48; margin-top: 2px; }

.modal-right {
  flex: 1; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px;
  min-width: 0;
}
.preview-frame {
  flex: 1; min-height: 380px;
  background: #0d0a07;
  border: 1px solid #3a2e22; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  background-image:
    linear-gradient(45deg, #15100a 25%, transparent 25%),
    linear-gradient(-45deg, #15100a 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #15100a 75%),
    linear-gradient(-45deg, transparent 75%, #15100a 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  position: relative; overflow: hidden;
}
.preview-canvas {
  max-width: 100%; max-height: 100%;
  image-rendering: -webkit-optimize-contrast;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
.modal-foot {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; border-top: 1px solid #3a2e22;
  background: linear-gradient(0deg, rgba(212,168,74,0.04), transparent);
}
.modal-foot .hint { font-size: 11px; color: #a89880; margin-right: auto; letter-spacing: 1px; }
.modal-foot .btn { letter-spacing: 2px; padding: 0 18px; height: 34px; }

/* 封面：角色名输入 */
.name-input {
  width: 100%; box-sizing: border-box;
  background: #15100a; border: 1px solid #3a2e22; border-radius: 8px;
  color: #f0e8d8; font-size: 13px; padding: 8px 12px;
  letter-spacing: 1px; outline: none; transition: border-color 0.2s;
  font-family: inherit;
}
.name-input:focus { border-color: #d4a84a; }
.name-input::placeholder { color: #6a5a48; }

/* 封面：缩放控制 */
.zoom-row {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
}
.zoom-row label { font-size: 11px; color: #a89880; letter-spacing: 1px; white-space: nowrap; }
.zoom-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px; background: #3a2e22; outline: none;
}
.zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: #d4a84a; cursor: pointer; border: 2px solid #1a1410;
}
.zoom-slider::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: #d4a84a; cursor: pointer; border: 2px solid #1a1410;
}
.zoom-val { font-size: 11px; color: #d4a84a; min-width: 32px; text-align: right; }
.reset-btn {
  font-size: 11px; color: #a89880; cursor: pointer;
  border: 1px solid #3a2e22; border-radius: 6px; padding: 3px 8px;
  letter-spacing: 1px; transition: all 0.2s; white-space: nowrap;
}
.reset-btn:hover { color: #d4a84a; border-color: #d4a84a; }

/* 封面：canvas 交互光标 */
.preview-canvas { cursor: grab; }
.preview-canvas.dragging { cursor: grabbing; }
.preview-canvas.no-img { cursor: default; }
</style>
</head>
<body>

<div class="app">
  <div class="left-panel">
    <div class="topbar">
      <img id="logoImg" src="logo.png" style="height:28px;width:auto;display:none" onerror="this.style.display='none'" onload="this.style.display='block'">
      <h1>节奏榜编辑器</h1>
      <span class="sub" id="charCount"></span>
      <button class="btn btn-sm" id="saveBtn">保存</button>
      <button class="btn btn-sm" id="resetBtn">重置</button>
      <button class="btn btn-sm" id="openCoverBtn">上传</button>
      <button class="btn btn-sm primary" id="addTierBtn">+ 添加阶级</button>
    </div>
    <div class="tier-scroll" id="tierScroll">
      <div id="tierContainer"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="topbar">
      <div class="pool-title">角色池</div>
      <span style="font-size:11px;color:var(--text2);margin-left:auto;">作者：番薯不甜</span>
    </div>
    <div class="pool-scroll">
      <div class="faction-filters" id="filters"></div>
      <div class="pool-grid" id="poolGrid"></div>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" data-action="baowu" id="ctxBaowu">🔮 宝具</div>
  <div class="ctx-item danger" data-action="remove" id="ctxRemove">✕ 移除</div>
  <div class="ctx-item danger" data-action="delete" id="ctxDelete">✕ 删除角色</div>
</div>

<div class="statusbar" id="statusbar">拖拽角色从右到左，在阶级间拖拽可移动，右键移除</div>

<script>
const FACTIONS = ["元素","旷野","奥术","圣堂","彼岸","幻境"];
const FACTION_COLORS = {

  "圣堂":"#FFD43B","彼岸":"#748FFC","幻境":"#F783AC"
};
// Each character can belong to multiple factions (encoded in filename digits: 1=元素,2=旷野,3=奥术,4=圣堂,5=彼岸,6=幻境)
const CHAR_FACTIONS = {

  "大力神":["旷野","奥术"],"大天使":["圣堂","彼岸"],"太极宗师":["旷野","幻境"],
  "太阳神":["圣堂","彼岸"],"奥法领主":["奥术","幻境"],"女武神":["圣堂","彼岸"],

  "巫女":["旷野","奥术"],"幽冥公主":["元素","奥术"],"恶欲魔王":["旷野","彼岸"],

  "捷足之神":["元素","幻境"],"断罪之翼":["奥术","幻境"],"无双剑豪":["圣堂","彼岸"],

  "永夜女王":["旷野","幻境"],"永恒之主":["圣堂","幻境"],"海神":["元素","幻境"],
  "湖上骑士":["元素","圣堂"],"湖中仙女":["元素","圣堂"],"炎魔":["元素","奥术"],

// State
let state = { tiers:[], filter:"全部" };

function loadCustomChars() {
  try { const raw = localStorage.getItem("tier_custom_chars"); return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
}
function saveCustomChars() {
  try { localStorage.setItem("tier_custom_chars", JSON.stringify(customChars)); } catch(e) {}
}

function getAllCharNames() {
  return [...new Set([...Object.keys(CHAR_FACTIONS), ...Object.keys(customChars)])];
}
function getCharFactions(name) {
  return CHAR_FACTIONS[name] || (customChars[name] ? customChars[name].factions : []);
}
function getCharImageSrc(name) {
  return customChars[name] && customChars[name].imageData
    ? customChars[name].imageData
    : '阵容/' + (CHAR_FILES[name] || name + '.png');
}
let dragData = null;
let ctxChar = null, ctxTier = null;

// DOM refs
const $ = id => document.getElementById(id);
const tierContainer = $('tierContainer');
const poolGrid = $('poolGrid');
const filtersEl = $('filters');
const statusbar = $('statusbar');
const charCount = $('charCount');
const ctxMenu = $('ctxMenu');

// ===== Image element cache =====
// All img elements ever created, keyed by character name
const imgCache = {};

function createCharImg(name) {
  const factions = getCharFactions(name);
  const primaryFaction = factions[0];
  const img = document.createElement('img');
  img.className = 'char-img';
  img.dataset.faction = primaryFaction;
  img.dataset.name = name;
  img.draggable = true;
  img.title = name;

  img.src = getCharImageSrc(name);
  img.onerror = function() { this.style.display = 'none'; };
  if (customChars[name]) img.dataset.custom = '1';

  img.addEventListener('dragstart', function(e) {
    const src = this.parentElement === poolGrid ? null : findTierIdx(this);
    dragData = { name, fromTier: src };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', name);
    setTimeout(() => this.classList.add('dragging'), 0);
  });
  img.addEventListener('dragend', function(e) {
    this.classList.remove('dragging');
    dragData = null;
    document.querySelectorAll('.tier-body,.tier-row').forEach(el => el.classList.remove('drag-over'));
  });
  img.addEventListener('contextmenu', function(e) {
    if (this.parentElement === poolGrid && !this.dataset.custom) return;
    e.preventDefault(); e.stopPropagation();
    ctxChar = this.dataset.name;
    ctxTier = this.parentElement === poolGrid ? null : findTierIdx(this);
    showCtxMenu(e.clientX, e.clientY);
  });

  imgCache[name] = img;
  return img;
}

function findTierIdx(img) {
  const body = img.closest('.tier-body');
  if (!body) return null;
  return parseInt(body.dataset.tierIdx);
}

// ===== Initial image creation =====
function initImages() {
  for (const name of getAllCharNames()) {
    createCharImg(name);
  }
}

// ===== Render tiers structure =====
function buildTierStructure() {
  tierContainer.innerHTML = '';
  state.tiers.forEach((tier, idx) => {
    const row = document.createElement('div');
    row.className = 'tier-row';
    row.dataset.tierIdx = idx;

    const labelArea = document.createElement('div');
    labelArea.className = 'tier-label-area';

    const bar = document.createElement('div');
    bar.className = 'tier-color-bar';
    bar.style.background = tier.color;
    bar.title = '点击修改颜色';
    bar.addEventListener('click', e => { e.stopPropagation(); changeTierColor(idx); });

    const nameEl = document.createElement('span');
    nameEl.className = 'tier-name';
    nameEl.textContent = tier.label;
    nameEl.title = '点击重命名';
    nameEl.addEventListener('click', e => { e.stopPropagation(); renameTier(idx); });

    const cnt = document.createElement('span');
    cnt.className = 'tier-count';
    cnt.textContent = tier.chars.length + ' 个';

    labelArea.appendChild(bar);
    labelArea.appendChild(nameEl);
    labelArea.appendChild(cnt);

    const body = document.createElement('div');
    body.className = 'tier-body' + (tier.chars.length === 0 ? ' empty' : '');
    body.dataset.tierIdx = idx;

    body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      document.querySelectorAll('.tier-body').forEach(el => el.classList.remove('drag-over'));
      handleDrop(idx, e.clientX);
    });

    const actions = document.createElement('div');
    actions.className = 'tier-actions';

    const renameBtn = document.createElement('span');
    renameBtn.className = 'tier-action-btn';
    renameBtn.textContent = '✎';
    renameBtn.title = '重命名';
    renameBtn.addEventListener('click', e => { e.stopPropagation(); renameTier(idx); });

    const delBtn = document.createElement('span');
    delBtn.className = 'tier-action-btn del';
    delBtn.textContent = '✕';
    delBtn.title = '删除阶级';
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTier(idx); });

    actions.appendChild(renameBtn);
    actions.appendChild(delBtn);

    row.appendChild(labelArea);
    row.appendChild(body);
    row.appendChild(actions);
    tierContainer.appendChild(row);
  });

  // Now populate tier bodies with cached images
  populateTiers();
}

function createTierCharDisplay(name, tierIdx) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;gap:4px;position:relative;z-index:0;';

  const img = imgCache[name];
  if (img) {
    img.className = 'char-img in-tier';
    img.dataset.tierIdx = tierIdx;
    wrap.appendChild(img);
  }

  // Baowu icon (if applicable)
  if (baowuMap[name]) {
    const bw = document.createElement('img');
    bw.className = 'baowu-icon';
    bw.src = '宝具.png';
    bw.style.cssText = 'height:55px;width:auto;flex-shrink:0;margin-left:-40px;position:relative;z-index:1;';
    bw.onerror = function() { this.style.display = 'none'; };
    wrap.appendChild(bw);
  }

  return wrap;
}

function populateTiers() {
  state.tiers.forEach((tier, idx) => {
    const body = getTierBody(idx);
    if (!body) return;
    body.querySelectorAll('.tier-char-wrap').forEach(el => el.remove());
    tier.chars.forEach(name => {
      if (imgCache[name]) {
        const wrap = createTierCharDisplay(name, idx);
        wrap.className = 'tier-char-wrap';
        body.appendChild(wrap);
      }
    });
    updateTierEmptyState(idx);
  });
}

function getTierBody(idx) {
  return tierContainer.querySelector('.tier-row[data-tier-idx="' + idx + '"] .tier-body');
}

function updateTierEmptyState(idx) {
  const body = getTierBody(idx);
  if (!body) return;
  const has = body.querySelectorAll('.char-img').length > 0;
  body.classList.toggle('empty', !has);
  const cnt = body.closest('.tier-row').querySelector('.tier-count');
  if (cnt) cnt.textContent = state.tiers[idx].chars.length + ' 个';
}

// ===== Pool =====
function updatePool() {
  const placed = new Set();
  state.tiers.forEach(t => t.chars.forEach(c => placed.add(c)));

  for (const name of getAllCharNames()) {
    const img = imgCache[name];
    if (!img) continue;
    if (placed.has(name)) {
      if (img.parentElement === poolGrid) img.remove();
    } else {
      const show = state.filter === '全部' || getCharFactions(name).includes(state.filter);
      img.className = 'char-img in-pool' + (show ? '' : ' hidden');
      if (img.parentElement !== poolGrid) {
        poolGrid.appendChild(img);
      }
    }
  }
}

// ===== Filters =====
function updateFilters() {
  filtersEl.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'faction-btn' + (state.filter === '全部' ? ' active' : '');
  allBtn.textContent = '全部';
  allBtn.addEventListener('click', function() { state.filter = '全部'; save(); updatePool(); updateFilters(); });
  filtersEl.appendChild(allBtn);

  FACTIONS.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'faction-btn' + (state.filter === f ? ' active' : '');
    btn.textContent = f;
    btn.style.borderColor = state.filter === f ? FACTION_COLORS[f] : undefined;
    btn.addEventListener('click', function() { state.filter = f; save(); updatePool(); updateFilters(); });
    filtersEl.appendChild(btn);
  });
}

function updateCharCount() {
  let total = 0;
  state.tiers.forEach(t => total += t.chars.length);
  charCount.textContent = '已分配 ' + total + ' / ' + getAllCharNames().length + ' 个角色';
}

function parseNameFromFilename(filename) {
  return filename.replace(/\.[^.]+$/, '').replace(/^\d+/, '') || '未知角色';
}

function parseFactionsFromFilename(filename) {
  const match = filename.match(/^(\d+)/);
  if (!match) return [FACTIONS[0]];
  const digits = match[1];
  const factions = [];
  for (const d of digits) {
    const idx = parseInt(d) - 1;
    if (idx >= 0 && idx < FACTIONS.length) {
      factions.push(FACTIONS[idx]);
    }
  }
  return factions.length > 0 ? [...new Set(factions)] : [FACTIONS[0]];
}

function handleFileUpload(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('请上传图片文件');
    return;
  }
  const fileName = file.name;
  const name = parseNameFromFilename(fileName);
  if (!name) { setStatus('无法识别文件名'); return; }
  if (getCharFactions(name).length > 0) {
    setStatus('角色 "' + name + '" 已存在');
    return;
  }
  const factions = parseFactionsFromFilename(fileName);
  const reader = new FileReader();
  reader.onload = function(e) {
    customChars[name] = { factions, imageData: e.target.result };
    saveCustomChars();
    save();
    createCharImg(name);
    updatePool();
    updateFilters();
    updateCharCount();
    setStatus('已添加角色: ' + name, true);
  };
  reader.onerror = function() { setStatus('读取图片失败'); };
  reader.readAsDataURL(file);
}

// 供封面生成器调用：将合成图作为自定义角色添加到角色池
window.addCustomChar = function(name, factions, imageData) {
  if (!name) { setStatus('请输入角色名'); return false; }
  if (getCharFactions(name).length > 0) { setStatus('角色 "' + name + '" 已存在'); return false; }
  customChars[name] = { factions: factions, imageData: imageData };
  saveCustomChars();
  save();
  createCharImg(name);
  updatePool();
  updateFilters();
  updateCharCount();
  setStatus('已添加角色: ' + name, true);
  return true;
};

// ===== Drop Logic =====
function handleDrop(tierIdx, dropX) {
  if (!dragData || !dragData.name) return;
  const name = dragData.name;
  const fromTier = dragData.fromTier;
  const targetChars = state.tiers[tierIdx].chars;

  if (fromTier === tierIdx) {
    // Same tier: reorder
    const oldIdx = targetChars.indexOf(name);
    if (oldIdx === -1) { dragData = null; return; }
    targetChars.splice(oldIdx, 1);
    // Find new insertion position based on mouse X
    const body = getTierBody(tierIdx);
    let insertAt = targetChars.length;
    if (body && dropX) {
      const wraps = body.querySelectorAll('.tier-char-wrap');
      for (let i = 0; i < wraps.length; i++) {
        const rect = wraps[i].getBoundingClientRect();
        if (dropX < rect.left + rect.width / 2) {
          insertAt = i;
          break;
        }
      }
    }
    targetChars.splice(insertAt, 0, name);
    dragData = null;
    save();
    refreshTierDisplay(tierIdx);
    updateCharCount();
    return;
  }

  if (targetChars.includes(name)) { dragData = null; return; }

  if (fromTier !== null) {
    const src = state.tiers[fromTier].chars;
    const i = src.indexOf(name);
    if (i !== -1) src.splice(i, 1);
  }

  targetChars.push(name);
  dragData = null;
  save();

  const img = imgCache[name];
  if (img && img.parentElement === poolGrid) img.remove();

  refreshTierDisplay(tierIdx);
  if (fromTier !== null) refreshTierDisplay(fromTier);

  updatePool();
  updateCharCount();
}

function refreshTierDisplay(idx) {
  const body = getTierBody(idx);
  if (!body) return;
  body.querySelectorAll('.tier-char-wrap').forEach(el => el.remove());
  state.tiers[idx].chars.forEach(name => {
    if (imgCache[name]) {
      const wrap = createTierCharDisplay(name, idx);
      wrap.className = 'tier-char-wrap';
      body.appendChild(wrap);
    }
  });
  updateTierEmptyState(idx);
}

// ===== Context Menu =====
function showCtxMenu(x, y) {
  const isPool = ctxTier === null;
  const isCustom = isPool && customChars[ctxChar] !== undefined;
  document.getElementById('ctxBaowu').style.display = isPool ? 'none' : '';
  document.getElementById('ctxRemove').style.display = isPool ? 'none' : '';
  document.getElementById('ctxDelete').style.display = isCustom ? 'block' : 'none';
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
  ctxMenu.classList.add('show');
}

document.addEventListener('click', function(e) {
  if (!ctxMenu.contains(e.target)) ctxMenu.classList.remove('show');
});

ctxMenu.addEventListener('click', function(e) {
  const action = e.target.dataset.action;
  if (!action) return;
  ctxMenu.classList.remove('show');
  if (ctxChar === null) return;
  if (action === 'baowu') {
    baowuMap[ctxChar] = !baowuMap[ctxChar];
    save();
    refreshTierDisplay(ctxTier);
    setStatus(baowuMap[ctxChar] ? '已添加宝具' : '已移除宝具');
  } else if (action === 'remove') {
    const idx = state.tiers[ctxTier].chars.indexOf(ctxChar);
    if (idx !== -1) {
      state.tiers[ctxTier].chars.splice(idx, 1);
      save();
      const img = imgCache[ctxChar];
      if (img && img.parentElement !== poolGrid) img.remove();
      refreshTierDisplay(ctxTier);
      updatePool();
      updateCharCount();
      setStatus('已移除 ' + ctxChar);
    }
  } else if (action === 'delete') {
    const img = imgCache[ctxChar];
    if (img) { img.remove(); delete imgCache[ctxChar]; }
    delete customChars[ctxChar];
    // Remove from all tiers if present
    state.tiers.forEach(t => {
      const i = t.chars.indexOf(ctxChar);
      if (i !== -1) t.chars.splice(i, 1);
    });
    saveCustomChars();
    save();
    buildTierStructure();
    updatePool();
    updateFilters();
    updateCharCount();
    setStatus('已删除角色: ' + ctxChar);
  }
  ctxChar = null;
  ctxTier = null;
});

// ===== Tier Operations =====
function renameTier(idx) {
  const tier = state.tiers[idx];
  const name = prompt('输入新的阶级名称：', tier.label);
  if (name && name.trim()) {
    tier.label = name.trim();
    save();
    // Update just the label text in DOM
    const row = tierContainer.querySelector('.tier-row[data-tier-idx="' + idx + '"]');
    if (row) row.querySelector('.tier-name').textContent = tier.label;
    setStatus('已重命名');
  }
}

function changeTierColor(idx) {
  const tier = state.tiers[idx];
  const input = document.createElement('input');
  input.type = 'color';
  input.value = tier.color;
  input.addEventListener('input', function() {
    tier.color = this.value;
    save();
    const row = tierContainer.querySelector('.tier-row[data-tier-idx="' + idx + '"]');
    if (row) row.querySelector('.tier-color-bar').style.background = tier.color;
  });
  input.addEventListener('change', function() { input.remove(); });
  input.click();
  document.body.appendChild(input);
  setTimeout(() => { if (input.parentNode) input.remove(); }, 60000);
}

function deleteTier(idx) {
  if (state.tiers.length <= 1) { setStatus('至少保留一个阶级'); return; }
  const tier = state.tiers[idx];
  if (!confirm('确定删除 "' + tier.label + '" 吗？' + tier.chars.length + ' 个角色将回到角色池。')) return;
  // Move chars back to pool in state
  tier.chars = [];
  state.tiers.splice(idx, 1);
  save();
  buildTierStructure();
  updatePool();
  updateCharCount();
  setStatus('已删除 ' + tier.label);
}

function addTier() {
  const colors = ['#c8392f','#d4691a','#d4a84a','#6a8a4a','#3a5a6a','#8a5a3a','#b85a4a','#5a7a6a','#4a6a8a','#a8763a'];
  const color = colors[(state.tiers.length) % colors.length];
  const label = 'T' + (state.tiers.length + 1);
  state.tiers.push({ label, color, chars: [] });
  save();
  buildTierStructure();
  updateCharCount();
  setStatus('已添加 ' + label);
  const scroll = $('tierScroll');
  setTimeout(() => { scroll.scrollTop = scroll.scrollHeight; }, 50);
}

function resetAll() {
  if (!confirm('确定重置所有数据吗？')) return;
  state.tiers = DEFAULT_TIERS.map(t => ({ label: t.label, color: t.color, chars: [] }));
  state.filter = '全部';
  baowuMap = {};
  save();
  buildTierStructure();
  updatePool();
  updateFilters();
  updateCharCount();
  setStatus('已重置');
}

// ===== Storage =====
function loadStorage() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tiers: state.tiers, filter: state.filter, baowu: baowuMap })); } catch(e) {}
}

// ===== Status =====
let statusTimeout = null;
function setStatus(msg, isSuccess) {
  statusbar.textContent = msg;
  statusbar.className = 'statusbar' + (isSuccess ? ' success' : '');
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    statusbar.className = 'statusbar';
    statusbar.textContent = '拖拽角色从右到左，在阶级间拖拽可移动，右键移除/添加宝具';
  }, 3000);
}
window.setStatus = setStatus;

// ===== Init =====
function init() {
  const saved = loadStorage();
  state.tiers = (saved && saved.tiers && saved.tiers.length)
    ? saved.tiers
    : DEFAULT_TIERS.map(t => ({ label: t.label, color: t.color, chars: [] }));
  state.filter = (saved && saved.filter) ? saved.filter : '全部';
  baowuMap = (saved && saved.baowu) ? saved.baowu : {};
  customChars = loadCustomChars();

  initImages();
  buildTierStructure();
  updatePool();
  updateFilters();
  updateCharCount();
}

// ============== 词条封面生成器 ==============
const COVER_PSD_W = 300, COVER_PSD_H = 400;
const COVER_FACTIONS_LIST = [
  { key:'元素', name:'元素', imgL:'ass/阵容_红左.png', imgR:'ass/阵容_红右.png', color:'#FF6B6B' },
  { key:'旷野', name:'旷野', imgL:'ass/阵容_绿左.png', imgR:'ass/阵容_绿右.png', color:'#69DB7C' },
  { key:'奥术', name:'奥术', imgL:'ass/阵容_蓝左.png', imgR:'ass/阵容_蓝右.png', color:'#DA77F2' },
  { key:'圣堂', name:'圣堂', imgL:'ass/阵容_光左.png', imgR:'ass/阵容_光右.png', color:'#FFD43B' },
  { key:'彼岸', name:'彼岸', imgL:'ass/阵容_彼岸左.png', imgR:'ass/阵容_彼岸右.png', color:'#748FFC' },
  { key:'幻境', name:'幻境', imgL:'ass/阵容_暗左.png', imgR:'ass/阵容_暗右.png', color:'#F783AC' },
];
const COVER_JOBS_LIST = ['刺客','守卫','法师','牧师','战士','射手'];
const COVER_POS = {
  base: { src:'ass/卡片底版.png', x:0, y:0, w:300, h:400 },
  layer4: { src:'ass/图层4.png', x:0, y:0, w:300, h:400 },
  factionL: { x:129, y:314, w:86, h:87 },
  factionR: { x:210, y:314, w:86, h:87 },
  job: { x:3, y:4, w:67, h:67 },
};

const coverState = {
  job: '守卫',
  factions: ['', ''],
  userImg: null,
  imgScale: 1.0,
  imgOffsetX: 0,
  imgOffsetY: 0
};
const coverImgCache = {};

function coverUpdateButtons() {
  const hasImg = !!coverState.userImg;
  $('coverDownloadBtn').classList.toggle('disabled', !hasImg);
  $('coverConfirmBtn').classList.toggle('disabled', !hasImg);
}

function coverLoadImg(src) {
  if (coverImgCache[src]) return coverImgCache[src];
  const realSrc = (typeof ASS_IMAGES !== 'undefined' && ASS_IMAGES[src]) ? ASS_IMAGES[src] : src;
  const p = new Promise((resolve) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = () => resolve(null);
    im.src = realSrc;
  });
  coverImgCache[src] = p;
  return p;
}

function coverBuildJobs() {
  const wrap = $('coverJobs'); wrap.innerHTML = '';
  COVER_JOBS_LIST.forEach(j => {
    const b = document.createElement('button');
    b.className = 'choice-btn' + (coverState.job === j ? ' active' : '');
    b.innerHTML = '<img src="ass/职业_' + j + '.png" onerror="this.style.opacity=0.3"><span class="lbl">' + j + '</span>';
    b.onclick = () => { coverState.job = j; coverBuildJobs(); coverRender(); };
    wrap.appendChild(b);
  });
}

function coverBuildFactions() {
  const wrap = $('coverFactions'); wrap.innerHTML = '';
  COVER_FACTIONS_LIST.forEach(f => {
    const b = document.createElement('button');
    b.className = 'choice-btn faction' + (coverState.factions.includes(f.key) ? ' active' : '');
    b.innerHTML = '<img src="' + f.imgL + '" onerror="this.style.opacity=0.3"><span class="lbl">' + f.name + '</span>';
    b.onclick = () => {
      const i = coverState.factions.indexOf(f.key);
      if (i !== -1) {
        coverState.factions[i] = '';
      } else {
        if (coverState.factions[0] === '') coverState.factions[0] = f.key;
        else if (coverState.factions[1] === '') coverState.factions[1] = f.key;
        else coverState.factions[1] = f.key;
      }
      coverBuildFactions();
      coverUpdateSlotCards();
      coverRender();
    };
    wrap.appendChild(b);
  });
}

function coverUpdateSlotCards() {
  [0, 1].forEach(i => {
    const el = $('coverSlot' + i);
    const f = coverState.factions[i];
    if (f) {
      const fac = COVER_FACTIONS_LIST.find(x => x.key === f);
      el.classList.add('filled');
      el.innerHTML = '<div style="text-align:center;display:flex;align-items:center;gap:6px;justify-content:center"><img src="' + fac.imgL + '" style="width:32px;height:32px;object-fit:contain"><div class="sl-name">' + fac.name + '</div></div>';
    } else {
      el.classList.remove('filled');
      el.innerHTML = '<div style="text-align:center"><div class="sl-name">未选</div></div>';
    }
  });
}

async function coverRender() {
  const canvas = $('coverCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, COVER_PSD_W, COVER_PSD_H);

  if (coverState.userImg) {
    const img = coverState.userImg;
    const ar = img.width / img.height;
    const baseSize = 300;
    const dw = baseSize * coverState.imgScale;
    const dh = (baseSize / ar) * coverState.imgScale;
    const dx = (COVER_PSD_W - dw) / 2 + coverState.imgOffsetX;
    const dy = 160 - dh/2 + coverState.imgOffsetY;
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  const base = await coverLoadImg(COVER_POS.base.src);
  if (base) ctx.drawImage(base, 0, 0, COVER_PSD_W, COVER_PSD_H);

  const layer4 = await coverLoadImg(COVER_POS.layer4.src);
  if (layer4) ctx.drawImage(layer4, COVER_POS.layer4.x, COVER_POS.layer4.y, COVER_POS.layer4.w, COVER_POS.layer4.h);

  for (let i = 0; i < 2; i++) {
    const f = coverState.factions[i];
    if (!f) continue;
    const fac = COVER_FACTIONS_LIST.find(x => x.key === f);
    const pos = (i === 0) ? COVER_POS.factionL : COVER_POS.factionR;
    const im = await coverLoadImg(fac.imgL);
    if (im) ctx.drawImage(im, pos.x, pos.y, pos.w, pos.h);
  }

  const jobImg = await coverLoadImg('ass/职业_' + coverState.job + '.png');
  if (jobImg) ctx.drawImage(jobImg, COVER_POS.job.x, COVER_POS.job.y, COVER_POS.job.w, COVER_POS.job.h);
}

function coverHandleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('请上传图片文件');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const im = new Image();
    im.onload = () => {
      coverState.userImg = im;
      coverUpdateButtons();
      coverRender();
      setStatus('图片已载入', true);
    };
    im.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function openCoverModal() {
  $('coverModal').classList.add('show');
  coverBuildJobs();
  coverBuildFactions();
  coverUpdateSlotCards();
  coverUpdateButtons();
  await coverRender();
}

let coverDownloadLastTime = 0;
async function coverDownload() {
  const now = Date.now();
  if (now - coverDownloadLastTime < 1000) return;
  coverDownloadLastTime = now;
  
  if (!coverState.userImg) { 
    setStatus('请先上传图片'); 
    return; 
  }
  const canvas = $('coverCanvas');
  if (!canvas) {
    setStatus('找不到画布');
    return;
  }
  let dataUrl;
  try { dataUrl = canvas.toDataURL('image/png'); } catch(e) { setStatus('导出失败：画布被污染，请刷新后重试'); return; }
  const defaultName = '词条封面_' + coverState.job + '_' + (coverState.factions.filter(Boolean).join('-') || '无阵') + '.png';
  const blob = await (await fetch(dataUrl)).blob();
  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: defaultName, types: [{ accept: { 'image/png': ['.png'] } }] });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      setStatus('已下载封面', true);
    } catch(e) {
      if (e.name === 'AbortError') return;
      setStatus('下载失败：' + e.message);
    }
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = defaultName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    setStatus('已下载封面', true);
  }
}

function coverConfirm() {
  if (!coverState.userImg) { 
    setStatus('请先上传图片'); 
    return; 
  }
  const factions = coverState.factions.filter(Boolean);
  const name = coverState.job + (factions.length ? '_' + factions.join('-') : '');
  const canvas = $('coverCanvas');
  let imageData;
  try { imageData = canvas.toDataURL('image/png'); } catch(e) { setStatus('导出失败：画布被污染，请刷新后重试'); return; }
  const success = addCustomChar(name, factions, imageData);
  if (success) {
    try {
      localStorage.setItem('tier_last_cover', JSON.stringify({
        job: coverState.job,
        factions: factions,
        dataUrl: imageData,
        ts: Date.now(),
      }));
    } catch(e) {}
    $('coverModal').classList.remove('show');
  } else {
    setStatus('添加失败，请尝试其他角色名');
  }
}

function coverInit() {
  const canvas = $('coverCanvas');
  const upZone = $('coverUpZone');
  const fileInput = $('coverFileInput');
  const zoomSlider = $('coverZoom');
  const zoomVal = $('coverZoomVal');

  $('coverClose').onclick = () => $('coverModal').classList.remove('show');
  $('coverCancelBtn').onclick = () => $('coverModal').classList.remove('show');
  $('coverModal').onclick = e => { if (e.target === $('coverModal')) $('coverModal').classList.remove('show'); };

  $('coverDownloadBtn').onclick = coverDownload;
  $('coverConfirmBtn').onclick = coverConfirm;

  upZone.onclick = () => fileInput.click();
  upZone.ondragover = e => { e.preventDefault(); upZone.classList.add('dragover'); };
  upZone.ondragleave = () => upZone.classList.remove('dragover');
  upZone.ondrop = e => {
    e.preventDefault();
    upZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) coverHandleFile(f);
  };
  fileInput.onchange = function() {
    if (this.files[0]) { coverHandleFile(this.files[0]); this.value = ''; }
  };

  canvas.onwheel = e => {
    if (!coverState.userImg) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    coverState.imgScale = Math.max(0.3, Math.min(5.0, coverState.imgScale * delta));
    zoomSlider.value = Math.round(coverState.imgScale * 100);
    zoomVal.textContent = zoomSlider.value + '%';
    coverRender();
  };

  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragStartOffsetX = 0, dragStartOffsetY = 0;

  canvas.onmousedown = e => {
    if (!coverState.userImg) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartOffsetX = coverState.imgOffsetX;
    dragStartOffsetY = coverState.imgOffsetY;
    canvas.classList.add('dragging');
  };

  canvas.onmousemove = e => {
    if (!isDragging || !coverState.userImg) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    coverState.imgOffsetX = dragStartOffsetX + dx;
    coverState.imgOffsetY = dragStartOffsetY + dy;
    coverRender();
  };

  canvas.onmouseup = () => { isDragging = false; canvas.classList.remove('dragging'); };
  canvas.onmouseleave = () => { isDragging = false; canvas.classList.remove('dragging'); };

  zoomSlider.oninput = () => {
    coverState.imgScale = parseInt(zoomSlider.value) / 100;
    zoomVal.textContent = zoomSlider.value + '%';
    coverRender();
  };

  $('coverResetBtn').onclick = () => {
    coverState.imgScale = 1.0;
    coverState.imgOffsetX = 0;
    coverState.imgOffsetY = 0;
    zoomSlider.value = 100;
    zoomVal.textContent = '100%';
    coverRender();
  };

}

// Events
$('addTierBtn').addEventListener('click', addTier);
$('saveBtn').addEventListener('click', function() { save(); setStatus('已保存', true); });
$('resetBtn').addEventListener('click', resetAll);
$('openCoverBtn').addEventListener('click', function() { openCoverModal(); });

init();
</script>

<script>
window.coverDoDownload = coverDownload;
window.coverDoConfirm = coverConfirm;

coverInit();
